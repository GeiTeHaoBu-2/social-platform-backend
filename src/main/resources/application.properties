spring.application.name=social-platform-back

# Reduce noisy Kafka Admin/Client INFO logs when Kafka is not fully ready
logging.level.org.apache.kafka.clients.admin.internals.AdminMetadataManager=ERROR
logging.level.org.apache.kafka.clients.admin=ERROR
logging.level.org.apache.kafka=ERROR
# Keep Flink connector logs at INFO by default
logging.level.org.apache.flink.connector.kafka=INFO

# Kafka 配置
kafka.bootstrap.servers=localhost:9092
kafka.topic=weibo.hotsearch
kafka.group.id=weibo-hotsearch-group

# 分析窗口配置
analysis.window.ms=60000

# 禁用 Spring Boot 的 Docker Compose 集成，因为当前使用的是本地环境
spring.docker.compose.enabled=false

# 数据源配置（本地数据库）
spring.datasource.url=jdbc:mysql://localhost:3306/your_database_name?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 配置（如果使用 JPA）
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
